

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ddd_inventory_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    networks:
      - ddd-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: ddd_inventory_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ddd-network
    depends_on:
      - app
      - db

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: ddd_inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5436:5432"
    networks:
      - ddd-network

networks:
  ddd-network:
    driver: bridge

volumes:
  db_data:

