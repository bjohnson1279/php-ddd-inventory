

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ddd_inventory_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    networks:
      - ddd-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: ddd_inventory_db
  web:
    image: nginx:alpine
    container_name: ddd_inventory_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ddd-network
    depends_on:
      - app
      - db

    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5436:5432"

  db-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    networks:
      - ddd-network

    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - BACKUP_NUM_KEEP=7
      - BACKUP_FREQUENCY=daily
      - SCHEDULE=@daily
      - ./infra/db/backups:/backups

  outbox-worker:
    container_name: ddd_inventory_outbox_worker
    command: ["php", "scripts/outbox-worker.php"]

  queue-worker:
    container_name: ddd_inventory_queue_worker
    command: ["php", "scripts/queue-worker.php"]
    volumes:
    networks:
      - ddd-network
    depends_on:
      - db

    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
      - ./:/var/www/html


networks:
  ddd-network:
    driver: bridge

volumes:
  db_data:





  web:
    image: nginx:alpine
    container_name: ddd_inventory_web
      - "8000:80"
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - app
