version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ddd_inventory_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      - PYTHON_SIDECAR_URL=http://python-sidecar:5000/optimize
    volumes:
      - ./:/var/www/html
    networks:
      - ddd-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - python-sidecar

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: ddd_inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5436:5432"
    networks:
      - ddd-network

  web:
    image: nginx:alpine
    container_name: ddd_inventory_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ddd-network
    depends_on:
      - app
      - db

  db-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    restart: unless-stopped
    networks:
      - ddd-network
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - BACKUP_NUM_KEEP=7
      - BACKUP_FREQUENCY=daily
      - SCHEDULE=@daily
    volumes:
      - ./infra/db/backups:/backups
    depends_on:
      - db

  outbox-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ddd_inventory_outbox_worker
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      - PYTHON_SIDECAR_URL=http://python-sidecar:5000/optimize
    command: ["php", "scripts/outbox-worker.php"]
    volumes:
      - ./:/var/www/html
    networks:
      - ddd-network
    depends_on:
      - db
      - python-sidecar

  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ddd_inventory_queue_worker
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      - PYTHON_SIDECAR_URL=http://python-sidecar:5000/optimize
    command: ["php", "scripts/queue-worker.php"]
    volumes:
      - ./:/var/www/html
    networks:
      - ddd-network
    depends_on:
      - db
      - python-sidecar

  python-sidecar:
    build:
      context: ../python-sidecar
      dockerfile: Dockerfile
    container_name: ddd_inventory_python_sidecar
    ports:
      - "5005:5000"
    networks:
      - ddd-network

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: ddd_inventory_mqtt
    ports:
      - "1885:1883"
      - "9003:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - ddd-network

networks:
  ddd-network:
    driver: bridge

volumes:
  db_data:
